<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voidda · Visualização de Peças</title>
<style>
:root{
  --bg:#0a0f1a;--s:#0d1520;--b:#111d2e;--br:#1e2d42;
  --t:#e8edf5;--t2:#a0afc0;--t3:#5a7080;
  --ac:#7c6af7;--ac2:#5a4fd4;--ok:#4caf82;--warn:#e0a84e;--er:#e05c5c;
  --mn:'SF Mono','Fira Mono',monospace;--ms:'Inter','Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:var(--ms);min-height:100vh;}
.screen{display:none;}
.screen.active{display:block;}
#screen-login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 20px;}
.login-logo{font-family:var(--mn);font-size:11px;color:var(--t3);letter-spacing:4px;text-transform:uppercase;}
.login-brand{font-size:26px;font-weight:800;letter-spacing:-1px;}
.login-brand span{color:var(--ac);}
.login-sub{font-size:13px;color:var(--t3);}
.login-box{background:var(--s);border:1px solid var(--br);border-radius:14px;padding:28px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;}
.login-box input{background:var(--b);border:1px solid var(--br);border-radius:8px;padding:11px 14px;color:var(--t);font-family:var(--mn);font-size:14px;outline:none;transition:border .2s;width:100%;}
.login-box input:focus{border-color:var(--ac);}
.login-box input.error{border-color:var(--er);}
.btn-login{background:var(--ac);border:none;border-radius:8px;padding:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-login:hover{background:var(--ac2);}
.login-err,.login-exp{font-size:12px;color:var(--er);display:none;text-align:center;}
.login-err.show,.login-exp.show{display:block;}
.login-help{font-size:12px;color:var(--t3);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--br);background:var(--s);position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{font-family:var(--mn);font-size:11px;color:var(--t3);letter-spacing:2px;}
.topbar-sep{color:var(--br);}
.topbar-client{font-size:13px;font-weight:600;}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.btn-logout{background:none;border:1px solid var(--br);border-radius:6px;padding:5px 11px;color:var(--t3);font-size:12px;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--er);color:var(--er);}
#screen-portal{min-height:100vh;}
.portal-body{max-width:820px;margin:0 auto;padding:28px 20px;}
.portal-header{margin-bottom:24px;}
.portal-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;}
.portal-sub{font-size:13px;color:var(--t3);}
.campanha-card{background:var(--s);border:1px solid var(--br);border-radius:12px;margin-bottom:14px;overflow:hidden;transition:border .2s;}
.campanha-card.open{border-color:var(--ac);}
.campanha-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;user-select:none;}
.campanha-head:hover{background:rgba(124,106,247,.04);}
.campanha-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.campanha-meta{font-size:12px;color:var(--t3);margin-top:3px;}
.campanha-badges{display:flex;align-items:center;gap:8px;}
.badge-count{background:var(--b);border:1px solid var(--br);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--t2);}
.badge-new{background:rgba(224,168,78,.15);border:1px solid rgba(224,168,78,.3);color:var(--warn);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;}
.chev{color:var(--t3);font-size:11px;transition:transform .2s;}
.campanha-card.open .chev{transform:rotate(90deg);}
.campanha-pecas{display:none;border-top:1px solid var(--br);padding:16px 18px;flex-wrap:wrap;gap:10px;}
.campanha-card.open .campanha-pecas{display:flex;}
.peca-btn{background:var(--b);border:1px solid var(--br);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;min-width:100px;display:flex;flex-direction:column;gap:6px;}
.peca-btn:hover{border-color:var(--ac);transform:translateY(-1px);}
.peca-dim{font-size:13px;font-weight:500;}
.peca-ver{font-family:var(--mn);font-size:11px;color:var(--ac);}
.peca-ver.novo{color:var(--warn);}
.peca-actions{display:flex;gap:6px;}
.peca-action{width:26px;height:26px;background:var(--s);border:1px solid var(--br);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:all .2s;text-decoration:none;}
.peca-action:hover{border-color:var(--ac);color:var(--ac);}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3);}
.empty-state h3{font-size:16px;margin-bottom:8px;color:var(--t2);}
#screen-viewer{min-height:100vh;display:flex;flex-direction:column;}
.viewer-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--br);background:var(--s);gap:12px;flex-wrap:wrap;}
.viewer-nav{display:flex;align-items:center;gap:8px;}
.viewer-back{background:none;border:1px solid var(--br);border-radius:6px;padding:6px 12px;color:var(--t2);font-size:12px;cursor:pointer;}
.viewer-back:hover{border-color:var(--ac);color:var(--ac);}
.viewer-breadcrumb{font-size:13px;color:var(--t3);}
.viewer-meta{display:flex;align-items:center;gap:6px;}
.viewer-tag{background:var(--b);border:1px solid var(--br);border-radius:4px;padding:3px 8px;font-size:11px;font-family:var(--mn);color:var(--t2);}
.viewer-tag.ver{color:var(--ac);}
.viewer-actions{display:flex;align-items:center;gap:8px;}
.viewer-action{background:none;border:1px solid var(--br);border-radius:6px;padding:6px 12px;color:var(--t2);font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;}
.viewer-action:hover{border-color:var(--ac);color:var(--ac);}
.viewer-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.viewer-frame-bg{border-radius:8px;display:flex;align-items:center;justify-content:center;background:repeating-conic-gradient(#1a2236 0% 25%,#111827 0% 50%) 0 0/20px 20px;}
.viewer-frame-bg iframe{border:none;display:block;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--s);border:1px solid var(--br);border-radius:14px;padding:24px;max-width:420px;width:100%;display:flex;flex-direction:column;gap:14px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;}
.hist-item{background:var(--b);border:1px solid var(--br);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:4px;}
.hist-ver{font-family:var(--mn);font-size:13px;color:var(--ac);font-weight:600;}
.hist-info{font-size:12px;color:var(--t3);}
.hist-current{border-color:var(--ac);background:rgba(124,106,247,.06);}
.hist-link{font-size:12px;color:var(--ac);text-decoration:none;margin-top:2px;display:inline-block;}
.hist-link:hover{text-decoration:underline;}
.btn-close-modal{background:none;border:1px solid var(--br);border-radius:7px;padding:8px 16px;color:var(--t3);font-size:13px;cursor:pointer;align-self:flex-end;}
.btn-close-modal:hover{border-color:var(--ac);color:var(--ac);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-logo">rush · voidda</div>
  <div class="login-brand">visualização<br><span>de peças</span></div>
  <div class="login-sub">Área do cliente</div>
  <div class="login-box">
    <input type="password" id="tokenInput" placeholder="Código de acesso" autocomplete="off">
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginError">Código inválido. Verifique e tente novamente.</div>
    <div class="login-exp" id="loginExpired">Este acesso expirou. Entre em contato com a Voidda.</div>
  </div>
  <div class="login-help">Precisa de ajuda? Fale com a Voidda</div>
</div>

<!-- PORTAL -->
<div id="screen-portal" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">rush · voidda</div>
      <div class="topbar-sep">·</div>
      <div class="topbar-avatar" id="topbarAvatar">?</div>
      <div class="topbar-client" id="topbarClientName"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">sair</button>
  </div>
  <div class="portal-body">
    <div class="portal-header">
      <div class="portal-title" id="portalTitle">Suas peças.</div>
      <div class="portal-sub" id="portalSub">Carregando...</div>
    </div>
    <div id="campanhasGrid"></div>
  </div>
</div>

<!-- VIEWER -->
<div id="screen-viewer" class="screen">
  <div class="viewer-bar">
    <div class="viewer-nav">
      <button class="viewer-back" onclick="backToPortal()">← Voltar</button>
      <div class="viewer-breadcrumb" id="viewerBreadcrumb"></div>
    </div>
    <div class="viewer-meta" id="viewerMeta"></div>
    <div class="viewer-actions">
      <button class="viewer-action" onclick="openHistory()">histórico</button>
      <button class="viewer-action" onclick="reloadFrame()">↺ recarregar</button>
      <button class="viewer-action" onclick="toggleBg()">fundo</button>
      <a class="viewer-action" id="viewerOpenLink" href="#" target="_blank">↗ abrir</a>
    </div>
  </div>
  <div class="viewer-body">
    <div class="viewer-frame-bg" id="viewerFrameBg">
      <iframe id="viewerFrame" src="" scrolling="no"></iframe>
    </div>
  </div>
</div>

<!-- MODAL HISTÓRICO -->
<div class="modal-overlay" id="histModal">
  <div class="modal-box">
    <div class="modal-title" id="histModalTitle">Histórico de versões</div>
    <div id="histModalContent"></div>
    <button class="btn-close-modal" onclick="closeHistory()">Fechar</button>
  </div>
</div>

<script>
const BASE_URL = 'https://displays.voidda.com.br';
let CLIENTS = {}, LOGS = [], cur = null, bgDark = true;
let viewerState = { cp: '', cid: '', dim: '', campName: '' };

Promise.all([
  fetch('/clients.json').then(r => r.json()),
  fetchLogs()
]).then(([clients, logs]) => {
  CLIENTS = clients;
  LOGS = logs;
  const m = window.location.pathname.match(/\/ver\/([^/]+)/);
  if (m) {
    const c = CLIENTS[m[1]];
    if (c && !exp(c)) { cur = c; render(c); show('portal'); }
    else if (c) showExp();
  }
}).catch(console.error);

async function fetchLogs() {
  try {
    const r = await fetch('https://displays.voidda.com.br/api/logs');
    if (r.ok) return r.json();
    return [];
  } catch(e) { return []; }
}

function exp(c) {
  return c.expiresAt ? new Date(c.expiresAt + 'T23:59:59') < new Date() : false;
}
function showExp() {
  document.getElementById('loginExpired').classList.add('show');
}
function doLogin() {
  const t = document.getElementById('tokenInput').value.trim().toLowerCase();
  const c = CLIENTS[t];
  if (!c) {
    document.getElementById('tokenInput').classList.add('error');
    document.getElementById('loginError').classList.add('show');
    document.getElementById('loginExpired').classList.remove('show');
    return;
  }
  if (exp(c)) {
    document.getElementById('tokenInput').classList.add('error');
    document.getElementById('loginExpired').classList.add('show');
    document.getElementById('loginError').classList.remove('show');
    return;
  }
  cur = c; render(c); show('portal');
}
document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
  document.getElementById('tokenInput').classList.remove('error');
  document.getElementById('loginError').classList.remove('show');
});
function doLogout() {
  cur = null;
  document.getElementById('tokenInput').value = '';
  show('login');
}
async function listDirs(path) {
  try {
    const r = await fetch('/api/pecas?path=' + encodeURIComponent(path));
    if (!r.ok) return [];
    return r.json();
  } catch(e) { return []; }
}
function getLatestVersion(clientPath, campId, dim) {
  const basePath = clientPath + '/' + campId;
  const fmtLogs = LOGS.filter(l => l.path === basePath && l.formato === dim && !l.disabled);
  if (!fmtLogs.length) return null;
  return fmtLogs.length;
}
function isUpdatedSince(clientPath, campId, dim, lastSeen) {
  if (!lastSeen) return false;
  const basePath = clientPath + '/' + campId;
  const fmtLogs = LOGS.filter(l => l.path === basePath && l.formato === dim && !l.disabled);
  if (!fmtLogs.length) return false;
  const latest = fmtLogs.sort((a,b) => new Date(b.data) - new Date(a.data))[0];
  return new Date(latest.data) > new Date(lastSeen);
}
function getLastSeen(token, campId) {
  try { return localStorage.getItem('seen_' + token + '_' + campId); } catch(e) { return null; }
}
function setLastSeen(token, campId) {
  try { localStorage.setItem('seen_' + token + '_' + campId, new Date().toISOString()); } catch(e) {}
}
async function render(client) {
  const token = Object.keys(CLIENTS).find(k => CLIENTS[k] === client) || '';
  document.getElementById('topbarClientName').textContent = client.name;
  document.getElementById('topbarAvatar').textContent = client.name.substring(0, 2).toUpperCase();
  document.getElementById('portalTitle').textContent = 'Suas peças, ' + client.name + '.';
  document.getElementById('portalSub').textContent = 'Carregando...';
  const grid = document.getElementById('campanhasGrid');
  grid.innerHTML = '';
  const camps = await Promise.all(
    client.campanhas.map(async camp => ({...camp, pecas: await listDirs(client.path + '/' + camp.id)}))
  );
  const total = camps.reduce((a, c) => a + c.pecas.length, 0);
  const ex = client.expiresAt ? ' · acesso válido até ' + new Date(client.expiresAt + 'T12:00:00').toLocaleDateString('pt-BR') : '';
  document.getElementById('portalSub').textContent = camps.length + ' campanha' + (camps.length > 1 ? 's' : '') + ' · ' + total + ' peça' + (total > 1 ? 's' : '') + ex;
  if (!camps.length) { grid.innerHTML = '<div class="empty-state"><h3>Nenhuma peça disponível</h3></div>'; return; }
  camps.forEach((camp, ci) => {
    const lastSeen = getLastSeen(token, camp.id);
    const hasNew = camp.pecas.some(dim => isUpdatedSince(client.path, camp.id, dim, lastSeen));
    const card = document.createElement('div');
    card.className = 'campanha-card';
    const head = document.createElement('div');
    head.className = 'campanha-head';
    const info = document.createElement('div');
    const nameRow = document.createElement('div');
    nameRow.className = 'campanha-name';
    nameRow.textContent = camp.name;
    const meta = document.createElement('div');
    meta.className = 'campanha-meta';
    meta.textContent = camp.pecas.length + ' peça' + (camp.pecas.length !== 1 ? 's' : '');
    info.appendChild(nameRow); info.appendChild(meta);
    const badges = document.createElement('div');
    badges.className = 'campanha-badges';
    if (hasNew) { const nb = document.createElement('div'); nb.className = 'badge-new'; nb.textContent = 'novo'; badges.appendChild(nb); }
    const cb = document.createElement('div'); cb.className = 'badge-count'; cb.textContent = camp.pecas.length + ' peças'; badges.appendChild(cb);
    const chev = document.createElement('span'); chev.className = 'chev'; chev.textContent = '›'; badges.appendChild(chev);
    head.appendChild(info); head.appendChild(badges);
    head.addEventListener('click', () => {
      card.classList.toggle('open');
      if (card.classList.contains('open')) { setLastSeen(token, camp.id); const nb = head.querySelector('.badge-new'); if (nb) nb.remove(); }
    });
    const pecasDiv = document.createElement('div');
    pecasDiv.className = 'campanha-pecas';
    if (!camp.pecas.length) {
      pecasDiv.innerHTML = '<div style="padding:4px 0;font-size:12px;color:var(--t3)">Nenhuma peça ainda.</div>';
    } else {
      camp.pecas.forEach(dim => {
        const ver = getLatestVersion(client.path, camp.id, dim);
        const isNew = isUpdatedSince(client.path, camp.id, dim, lastSeen);
        pecasDiv.appendChild(makePecaBtn(client.path, camp.id, dim, camp.name, ver, isNew));
      });
    }
    card.appendChild(head); card.appendChild(pecasDiv); grid.appendChild(card);
    if (camps.length === 1) { setTimeout(() => { card.classList.add('open'); setLastSeen(token, camp.id); }, 100); }
  });
}
function makePecaBtn(cp, cid, dim, campName, ver, isNew) {
  const wrap = document.createElement('div'); wrap.className = 'peca-btn';
  const dimEl = document.createElement('div'); dimEl.className = 'peca-dim'; dimEl.textContent = dim;
  const verEl = document.createElement('div'); verEl.className = 'peca-ver' + (isNew ? ' novo' : ''); verEl.textContent = ver ? 'v' + ver : '—';
  verEl.title = 'Clique para ver histórico'; verEl.style.cursor = 'pointer';
  verEl.addEventListener('click', e => { e.stopPropagation(); openHistory(cp, cid, dim); });
  const acts = document.createElement('div'); acts.className = 'peca-actions';
  const url = ver ? BASE_URL + '/' + cp + '/' + cid + '/' + dim + '/v' + ver + '/' : BASE_URL + '/' + cp + '/' + cid + '/' + dim + '/';
  const viewBtn = document.createElement('div'); viewBtn.className = 'peca-action'; viewBtn.title = 'Ver inline';
  viewBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  viewBtn.addEventListener('click', () => openV(cp, cid, dim, campName, ver));
  const openLink = document.createElement('a'); openLink.className = 'peca-action'; openLink.href = url; openLink.target = '_blank'; openLink.title = 'Abrir no browser';
  openLink.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>';
  acts.appendChild(viewBtn); acts.appendChild(openLink);
  wrap.appendChild(dimEl); wrap.appendChild(verEl); wrap.appendChild(acts);
  return wrap;
}
function openV(cp, cid, dim, campName, ver) {
  const url = ver ? BASE_URL + '/' + cp + '/' + cid + '/' + dim + '/v' + ver + '/' : BASE_URL + '/' + cp + '/' + cid + '/' + dim + '/';
  viewerState = { cp, cid, dim, campName, ver };
  const p = dim.match(/^(\d+)x(\d+)$/i);
  const w = p ? parseInt(p[1]) : 400, h = p ? parseInt(p[2]) : 300;
  document.getElementById('viewerBreadcrumb').textContent = cur.name + ' · ' + campName + ' · ' + dim;
  document.getElementById('viewerOpenLink').href = url;
  const meta = document.getElementById('viewerMeta'); meta.innerHTML = '';
  const t1 = document.createElement('span'); t1.className = 'viewer-tag'; t1.textContent = dim;
  const t2 = document.createElement('span'); t2.className = 'viewer-tag'; t2.textContent = campName;
  const t3 = document.createElement('span'); t3.className = 'viewer-tag ver'; t3.textContent = ver ? 'v' + ver : '—';
  meta.appendChild(t1); meta.appendChild(t2); meta.appendChild(t3);
  const f = document.getElementById('viewerFrame'), bg = document.getElementById('viewerFrameBg');
  f.style.width = w + 'px'; f.style.height = h + 'px';
  bg.style.width = (w+48) + 'px'; bg.style.height = (h+48) + 'px';
  f.src = url; show('viewer');
}
function backToPortal() { document.getElementById('viewerFrame').src = ''; show('portal'); }
function reloadFrame() { const f = document.getElementById('viewerFrame'); f.src = f.src; }
function toggleBg() {
  const bg = document.getElementById('viewerFrameBg'); bgDark = !bgDark;
  bg.style.background = bgDark ? 'repeating-conic-gradient(#1a2236 0% 25%,#111827 0% 50%) 0 0/20px 20px' : 'repeating-conic-gradient(#e5e7eb 0% 25%,#ffffff 0% 50%) 0 0/20px 20px';
}
function openHistory(cp, cid, dim) {
  if (!cp) { cp = viewerState.cp; cid = viewerState.cid; dim = viewerState.dim; }
  const basePath = cp + '/' + cid;
  const fmtLogs = LOGS.filter(l => l.path === basePath && l.formato === dim).sort((a,b) => new Date(b.data) - new Date(a.data));
  document.getElementById('histModalTitle').textContent = dim + ' — histórico de versões';
  const content = document.getElementById('histModalContent'); content.innerHTML = '';
  if (!fmtLogs.length) { content.innerHTML = '<div style="font-size:13px;color:var(--t3)">Nenhum registro.</div>'; }
  else {
    fmtLogs.forEach((log, i) => {
      const ver = fmtLogs.length - i;
      const url = BASE_URL + '/' + basePath + '/' + dim + '/v' + ver + '/';
      const item = document.createElement('div'); item.className = 'hist-item' + (i === 0 ? ' hist-current' : '');
      const verEl = document.createElement('div'); verEl.className = 'hist-ver'; verEl.textContent = 'v' + ver + (i === 0 ? ' — atual' : '');
      const infoEl = document.createElement('div'); infoEl.className = 'hist-info';
      const dt = log.data ? new Date(log.data).toLocaleString('pt-BR') : '—';
      infoEl.textContent = dt + (log.motion ? ' · ' + log.motion : '') + (log.comentario ? ' · "' + log.comentario + '"' : '');
      const linkEl = document.createElement('a'); linkEl.className = 'hist-link'; linkEl.href = url; linkEl.target = '_blank'; linkEl.textContent = 'abrir v' + ver + ' →';
      item.appendChild(verEl); item.appendChild(infoEl); item.appendChild(linkEl); content.appendChild(item);
    });
  }
  document.getElementById('histModal').classList.add('open');
}
function closeHistory() { document.getElementById('histModal').classList.remove('open'); }
document.getElementById('histModal').addEventListener('click', e => { if (e.target === document.getElementById('histModal')) closeHistory(); });
function show(n) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('screen-' + n).classList.add('active'); window.scrollTo(0,0); }
</script>
</body>
