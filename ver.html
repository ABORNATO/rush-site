<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voidda · Visualização de Peças</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 52 90' xmlns='http://www.w3.org/2000/svg'><polygon points='0,70 28,0 44,0 22,46 52,46 16,90 0,90' fill='%232563eb'/><polygon points='22,46 52,46 16,90 36,90 62,46 44,0 28,0' fill='%231d4ed8'/></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#07090f;--bg2:#0b0e18;--bg3:#0f1420;--card:#111827;--card2:#161e2e;
  --border:#1a2236;--border2:#22304a;--blue:#2563eb;--blue2:#1d4ed8;--blue3:#1e3a6e;
  --glow:#2563eb1a;--text:#eef2ff;--text2:#8496b0;--text3:#3d5068;--accent:#60a5fa;
  --green:#22c55e;--amber:#f59e0b;
  --f-display:'Syne',sans-serif;--f-body:'DM Sans',sans-serif;--f-mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--f-body);font-size:15px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.025;pointer-events:none;z-index:0;}
.screen{display:none;min-height:100vh;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column}
#screen-login{align-items:center;justify-content:center;padding:24px;}
.login-wrap{width:100%;max-width:420px;animation:fadeUp .5s ease both;}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:48px;justify-content:center;}
.login-logo-text{display:flex;flex-direction:column;line-height:1}
.login-logo-rush{font-family:var(--f-display);font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.login-logo-by{font-size:9px;letter-spacing:.2em;color:var(--text3);margin-top:2px;font-family:var(--f-mono)}
.login-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:36px;}
.login-title{font-family:var(--f-display);font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px;}
.login-sub{font-size:14px;color:var(--text3);margin-bottom:28px}
.login-label{font-size:12px;color:var(--text2);margin-bottom:8px;display:block;font-family:var(--f-mono);letter-spacing:.06em;text-transform:uppercase}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:15px;color:var(--text);font-family:var(--f-mono);letter-spacing:.08em;outline:none;transition:border-color .2s;margin-bottom:8px;}
.login-input:focus{border-color:var(--blue3)}.login-input.error{border-color:#ef4444}
.login-error{font-size:12px;color:#ef4444;margin-bottom:16px;display:none;font-family:var(--f-mono);}
.login-error.show{display:block}
.login-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--f-body);transition:background .2s,transform .1s;margin-top:8px;}
.login-btn:hover{background:var(--blue2)}.login-btn:active{transform:scale(.99)}
.login-footer{text-align:center;margin-top:24px;font-size:12px;color:var(--text3);}
#screen-portal{flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:rgba(7,9,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.topbar-rush{font-family:var(--f-display);font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.topbar-by{font-size:8px;letter-spacing:.2em;color:var(--text3);font-family:var(--f-mono)}
.topbar-client{display:flex;align-items:center;gap:10px;}
.topbar-client-name{font-size:13px;color:var(--text2);font-family:var(--f-mono);}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:var(--glow);border:1px solid var(--blue3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);font-family:var(--f-display);}
.topbar-logout{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--f-mono);padding:6px 10px;border-radius:6px;transition:color .2s;margin-left:8px;}
.topbar-logout:hover{color:var(--text2)}
.portal-main{flex:1;padding:40px 32px;max-width:1100px;width:100%;margin:0 auto;}
.portal-header{margin-bottom:40px;animation:fadeUp .4s ease both;}
.portal-greeting{font-size:12px;color:var(--text3);font-family:var(--f-mono);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.portal-title{font-family:var(--f-display);font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:6px;}
.portal-sub{font-size:14px;color:var(--text3)}
.campanhas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.campanha-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s,transform .2s;animation:fadeUp .4s ease both;cursor:pointer;}
.campanha-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.campanha-card.open{border-color:var(--blue3)}
.campanha-head{padding:20px 22px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.campanha-name{font-family:var(--f-display);font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-.3px;}
.campanha-meta{font-size:12px;color:var(--text3);font-family:var(--f-mono);}
.campanha-count{background:var(--glow);border:1px solid var(--blue3);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--accent);font-family:var(--f-mono);white-space:nowrap;flex-shrink:0;}
.campanha-pecas{display:none;padding:0 12px 12px;gap:8px;flex-wrap:wrap;}
.campanha-card.open .campanha-pecas{display:flex}
.peca-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .15s;text-decoration:none;flex:1;min-width:140px;}
.peca-btn:hover{background:var(--card2);border-color:var(--border2)}
.peca-dim{font-size:12px;font-weight:600;color:var(--text);font-family:var(--f-mono);}
.peca-label{font-size:11px;color:var(--text3);margin-top:1px}
.peca-actions{display:flex;gap:4px;margin-left:auto;}
.peca-action{width:28px;height:28px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--text3);}
.peca-action:hover{background:var(--glow);border-color:var(--blue3);color:var(--accent)}
#screen-viewer{flex-direction:column}
.viewer-topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.viewer-back{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--f-body);padding:6px 10px;border-radius:6px;transition:color .2s;}
.viewer-back:hover{color:var(--text)}
.viewer-breadcrumb{font-size:12px;color:var(--text3);font-family:var(--f-mono);flex:1;}
.viewer-open-btn{display:flex;align-items:center;gap:7px;background:var(--blue);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f-body);transition:background .2s;text-decoration:none;}
.viewer-open-btn:hover{background:var(--blue2)}
.viewer-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;}
.viewer-meta{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.viewer-tag{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:11px;font-family:var(--f-mono);color:var(--text2);}
.viewer-frame-wrap{background:var(--card);border:1px solid var(--border2);border-radius:12px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;padding:24px;}
.viewer-frame-bg{background:repeating-conic-gradient(#1a2236 0% 25%,#111827 0% 50%) 0 0/20px 20px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.viewer-iframe{display:block;border:none;}
.viewer-controls{display:flex;align-items:center;gap:12px;}
.viewer-ctrl-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--f-body);transition:all .15s;}
.viewer-ctrl-btn:hover{border-color:var(--border2);color:var(--text)}
.viewer-size-display{font-size:12px;color:var(--text3);font-family:var(--f-mono);padding:7px 14px;background:var(--bg3);border-radius:7px;border:1px solid var(--border);}
.empty-state{text-align:center;padding:80px 24px;color:var(--text3);}
.empty-state h3{font-family:var(--f-display);font-size:20px;color:var(--text2);margin-bottom:8px;}
.empty-state p{font-size:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.portal-main{padding:24px 16px}.topbar{padding:0 16px}.portal-title{font-size:24px}.campanhas-grid{grid-template-columns:1fr}.viewer-main{padding:16px}}

.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.filter-chip{padding:5px 12px;border-radius:20px;font-family:var(--font-mono,monospace);font-size:11px;cursor:pointer;border:1px solid var(--border,#2a2a2a);color:var(--text3,#888);background:transparent;transition:all .15s;}
.filter-chip:hover{border-color:var(--text2,#aaa);color:var(--text,#f0f0f0);}
.filter-chip.active{background:var(--accent,#c8f53a);color:#0a0a0a;border-color:var(--accent,#c8f53a);}
.peca-ver{font-family:var(--font-mono,monospace);font-size:10px;font-weight:600;color:var(--accent,#c8f53a);margin-left:4px;}
.peca-updated{display:inline-block;font-family:var(--font-mono,monospace);font-size:9px;background:rgba(200,245,58,0.15);color:var(--accent,#c8f53a);border:1px solid rgba(200,245,58,0.3);border-radius:3px;padding:1px 5px;margin-left:6px;vertical-align:middle;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">
      <svg width="26" height="45" viewBox="0 0 52 90" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,70 28,0 44,0 22,46 52,46 16,90 0,90" fill="#2563eb"/>
        <polygon points="22,46 52,46 16,90 36,90 62,46 44,0 28,0" fill="#1d4ed8"/>
      </svg>
      <div class="login-logo-text">
        <span class="login-logo-rush">rush</span>
        <span class="login-logo-by">BY VOIDDA</span>
      </div>
    </div>
    <div class="login-card">
      <div class="login-title">Área do cliente</div>
      <div class="login-sub">Digite o código de acesso enviado pela Voidda</div>
      <label class="login-label">Código de acesso</label>
      <input class="login-input" id="tokenInput" type="text" placeholder="ex: af2026xk9" autocomplete="off" spellcheck="false">
      <div class="login-error" id="loginError">Código inválido. Verifique e tente novamente.</div>
      <div class="login-error" id="loginExpired">Este acesso expirou. Entre em contato com a Voidda.</div>
      <button class="login-btn" onclick="doLogin()">Entrar</button>
    </div>
    <div class="login-footer">
      Precisa de ajuda? <a href="https://wa.me/5511975009521" target="_blank" style="color:var(--accent);text-decoration:none">Fale com a Voidda</a>
    </div>
  </div>
</div>

<!-- PORTAL -->
<div id="screen-portal" class="screen">
  <div class="topbar">
    <a class="topbar-logo" href="#">
      <svg width="18" height="31" viewBox="0 0 52 90" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,70 28,0 44,0 22,46 52,46 16,90 0,90" fill="#2563eb"/>
        <polygon points="22,46 52,46 16,90 36,90 62,46 44,0 28,0" fill="#1d4ed8"/>
      </svg>
      <div><div class="topbar-rush">rush</div><div class="topbar-by">BY VOIDDA</div></div>
    </a>
    <div class="topbar-client">
      <div class="topbar-client-name" id="topbarClientName"></div>
      <div class="topbar-avatar" id="topbarAvatar"></div>
      <button class="topbar-logout" onclick="doLogout()">sair</button>
    </div>
  </div>
  <div class="portal-main">
    <div class="portal-header">
      <div class="portal-greeting">Olá,</div>
      <div class="portal-title" id="portalTitle"></div>
      <div class="portal-sub" id="portalSub"></div>
    </div>
    <div class="campanhas-grid" id="campanhasGrid"></div>
  </div>
</div>

<!-- VIEWER -->
<div id="screen-viewer" class="screen">
  <div class="viewer-topbar">
    <button class="viewer-back" onclick="backToPortal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </button>
    <div class="viewer-breadcrumb" id="viewerBreadcrumb"></div>
    <a class="viewer-open-btn" id="viewerOpenLink" href="#" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
      Abrir no browser
    </a>
  </div>
  <div class="viewer-main">
    <div class="viewer-meta" id="viewerMeta"></div>
    <div class="viewer-frame-wrap">
      <div class="viewer-frame-bg" id="viewerFrameBg">
        <iframe id="viewerFrame" class="viewer-iframe" src="" scrolling="no" frameborder="0"></iframe>
      </div>
    </div>
    <div class="viewer-controls">
      <button class="viewer-ctrl-btn" onclick="reloadFrame()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Recarregar
      </button>
      <div class="viewer-size-display" id="viewerSizeDisplay"></div>
      <button class="viewer-ctrl-btn" onclick="toggleBg()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 010 20"/></svg>
        Fundo
      </button>
    </div>
  </div>
</div>

<script>
const BASE_URL="https://displays.voidda.com.br";
let CLIENTS={},cur=null,bgDark=true,logs=[];
let activeFilter='todas';

Promise.all([
  fetch('/clients.json').then(r=>r.json()),
  fetch('/api/logs').then(r=>r.ok?r.json():[]).catch(()=>[])
]).then(([clients,logsData])=>{
  CLIENTS=clients;logs=logsData||[];
  const m=window.location.pathname.match(/\/ver\/([^/]+)/);
  if(m){const c=CLIENTS[m[1]];if(c&&!exp(c)){cur=c;render(c);show('portal');}else if(c)showExp();}
}).catch(console.error);

function exp(c){return c.expiresAt?new Date(c.expiresAt+'T23:59:59')<new Date():false;}
function showExp(){document.getElementById('tokenInput').classList.add('error');document.getElementById('loginExpired').classList.add('show');}
function doLogin(){
  const t=document.getElementById('tokenInput').value.trim().toLowerCase(),c=CLIENTS[t];
  if(!c){document.getElementById('tokenInput').classList.add('error');document.getElementById('loginError').classList.add('show');document.getElementById('loginExpired').classList.remove('show');return;}
  if(exp(c)){document.getElementById('tokenInput').classList.add('error');document.getElementById('loginExpired').classList.add('show');document.getElementById('loginError').classList.remove('show');return;}
  cur=c;render(c);show('portal');
}
document.getElementById('tokenInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')doLogin();
  document.getElementById('tokenInput').classList.remove('error');
  document.getElementById('loginError').classList.remove('show');
});
function doLogout(){cur=null;document.getElementById('tokenInput').value='';show('login');}

async function listDirs(path){
  try{const r=await fetch('/api/pecas?path='+encodeURIComponent(path));if(!r.ok)return[];return r.json();}catch(e){return[];}
}
function getVersion(basePath,formato){
  return logs.filter(l=>l.path===basePath&&l.formato===formato&&!l.disabled).length;
}
function isUpdated(basePath,formato){
  const fl=logs.filter(l=>l.path===basePath&&l.formato===formato&&!l.disabled);
  if(!fl.length)return false;
  const latest=fl.sort((a,b)=>new Date(b.data)-new Date(a.data))[0];
  return(new Date()-new Date(latest.data))<48*60*60*1000;
}
function getPecaUrl(basePath,formato){
  const ver=getVersion(basePath,formato);
  if(ver>0)return BASE_URL+'/'+basePath+'/'+formato+'/v'+ver+'/';
  return BASE_URL+'/'+basePath+'/'+formato+'/';
}

async function render(client){
  document.getElementById('topbarClientName').textContent=client.name;
  document.getElementById('topbarAvatar').textContent=client.name.substring(0,2).toUpperCase();
  document.getElementById('portalTitle').textContent='Suas pecas, '+client.name+'.';
  document.getElementById('portalSub').textContent='Carregando...';
  const grid=document.getElementById('campanhasGrid');
  grid.innerHTML='';
  const camps=await Promise.all(
    client.campanhas.map(async camp=>({...camp,pecas:await listDirs(client.path+'/'+camp.id)}))
  );
  const total=camps.reduce((a,c)=>a+c.pecas.length,0);
  const ex=client.expiresAt?' · acesso valido ate '+new Date(client.expiresAt+'T12:00:00').toLocaleDateString('pt-BR'):'';
  document.getElementById('portalSub').textContent=camps.length+' campanha'+(camps.length>1?'s':'')+' · '+total+' peca'+(total>1?'s':'')+ex;

  // Filtros de campanha
  const oldFilter=document.getElementById('filter-row');if(oldFilter)oldFilter.remove();
  if(camps.length>1){
    const filterArea=document.createElement('div');filterArea.className='filter-row';filterArea.id='filter-row';
    const allChip=document.createElement('button');allChip.className='filter-chip active';allChip.textContent='todas';
    allChip.addEventListener('click',()=>{activeFilter='todas';updateFilterChips();renderCamps(camps,client,grid);});
    filterArea.appendChild(allChip);
    camps.forEach(camp=>{
      const chip=document.createElement('button');chip.className='filter-chip';chip.textContent=camp.name;chip.dataset.campId=camp.id;
      chip.addEventListener('click',()=>{activeFilter=camp.id;updateFilterChips();renderCamps(camps,client,grid);});
      filterArea.appendChild(chip);
    });
    grid.parentNode.insertBefore(filterArea,grid);
  }
  if(!camps.length){grid.innerHTML='<div class="empty-state"><h3>Nenhuma peca disponivel</h3></div>';return;}
  renderCamps(camps,client,grid);
}
function updateFilterChips(){
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('active',c.textContent==='todas'?activeFilter==='todas':c.dataset.campId===activeFilter);
  });
}
function renderCamps(camps,client,grid){
  grid.innerHTML='';
  const filtered=activeFilter==='todas'?camps:camps.filter(c=>c.id===activeFilter);
  if(!filtered.length){grid.innerHTML='<div class="empty-state"><h3>Nenhuma peca para este filtro</h3></div>';return;}
  filtered.forEach((camp,ci)=>{
    const card=document.createElement('div');card.className='campanha-card';card.style.animationDelay=ci*0.07+'s';
    const head=document.createElement('div');head.className='campanha-head';
    head.innerHTML='<div class="campanha-info"><div class="campanha-name">'+camp.name+'</div>'
      +'<div class="campanha-meta">'+camp.pecas.length+' peca'+(camp.pecas.length!==1?'s':'')+'</div></div>'
      +'<div class="campanha-count">'+camp.pecas.length+' pecas</div>';
    head.addEventListener('click',()=>card.classList.toggle('open'));
    const pecasDiv=document.createElement('div');pecasDiv.className='campanha-pecas';
    if(camp.pecas.length===0){
      pecasDiv.innerHTML='<div style="padding:12px 22px;font-size:12px;color:var(--text3)">Nenhuma peca — aguarde o Motion subir os arquivos</div>';
    }else{
      camp.pecas.forEach(dim=>{
        const basePath=client.path+'/'+camp.id;
        const ver=getVersion(basePath,dim);
        const updated=isUpdated(basePath,dim);
        const url=getPecaUrl(basePath,dim);
        const btn=document.createElement('div');btn.className='peca-btn';
        const left=document.createElement('div');left.style.display='flex';left.style.alignItems='center';
        const dimEl=document.createElement('div');dimEl.className='peca-dim';dimEl.textContent=dim;
        left.appendChild(dimEl);
        if(ver>0){const ve=document.createElement('span');ve.className='peca-ver';ve.textContent='v'+ver;left.appendChild(ve);}
        if(updated){const ue=document.createElement('span');ue.className='peca-updated';ue.textContent='novo';left.appendChild(ue);}
        const acts=document.createElement('div');acts.className='peca-actions';
        const viewBtn=document.createElement('div');viewBtn.className='peca-action';viewBtn.title='Ver';
        viewBtn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        viewBtn.addEventListener('click',()=>openV(client.path,camp.id,dim,camp.name,ver));
        const openLink=document.createElement('a');openLink.className='peca-action';openLink.href=url;openLink.target='_blank';
        openLink.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>';
        acts.appendChild(viewBtn);acts.appendChild(openLink);
        btn.appendChild(left);btn.appendChild(acts);
        pecasDiv.appendChild(btn);
      });
    }
    card.appendChild(head);card.appendChild(pecasDiv);
    grid.appendChild(card);
  });
}
function openV(cp,cid,dim,cn,ver){
  const url=getPecaUrl(cp+'/'+cid,dim);
  const p=dim.match(/^(\d+)x(\d+)$/);
  const w=p?parseInt(p[1]):400,h=p?parseInt(p[2]):300;
  document.getElementById('viewerBreadcrumb').textContent=cur.name+' · '+cn+' · '+dim+(ver?' v'+ver:'');
  document.getElementById('viewerOpenLink').href=url;
  document.getElementById('viewerSizeDisplay').textContent=w+' x '+h+' px';
  document.getElementById('viewerMeta').innerHTML='<span class="viewer-tag">'+dim+'</span><span class="viewer-tag">'+cn+'</span>'+(ver?'<span class="viewer-tag">v'+ver+'</span>':'');
  const f=document.getElementById('viewerFrame'),bg=document.getElementById('viewerFrameBg');
  f.style.width=w+'px';f.style.height=h+'px';bg.style.width=(w+48)+'px';bg.style.height=(h+48)+'px';
  f.src=url;show('viewer');
}
function backToPortal(){document.getElementById('viewerFrame').src='';show('portal');}
function reloadFrame(){const f=document.getElementById('viewerFrame');f.src=f.src;}
function toggleBg(){
  const bg=document.getElementById('viewerFrameBg');bgDark=!bgDark;
  bg.style.background=bgDark?'repeating-conic-gradient(#1a2236 0% 25%,#111827 0% 50%) 0 0/20px 20px':'repeating-conic-gradient(#e5e7eb 0% 25%,#ffffff 0% 50%) 0 0/20px 20px';
}
function show(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  window.scrollTo(0,0);
}
</script>
