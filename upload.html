<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush · Entrega de Peças</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --border-active: #333;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #c8f53a;
    --accent-dim: rgba(200, 245, 58, 0.08);
    --accent-dim2: rgba(200, 245, 58, 0.15);
    --error: #ff4d4d;
    --success: #c8f53a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── TELA DE LOGIN ── */
  #login-screen {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .login-header {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .login-title {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 6px;
  }

  .token-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .token-input-wrap label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .token-input-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
    width: 100%;
  }

  .token-input-wrap input:focus {
    border-color: var(--accent);
  }

  .token-input-wrap input::placeholder { color: var(--muted); }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 4px;
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 100%;
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .login-error {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--error);
    display: none;
    margin-top: -16px;
  }

  /* ── TELA DE UPLOAD ── */
  #upload-screen {
    display: none;
    width: 100%;
    max-width: 640px;
    flex-direction: column;
    gap: 0;
  }

  /* Header */
  .upload-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .upload-header-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .upload-logo {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .upload-user {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .btn-logout:hover {
    border-color: var(--border-active);
    color: var(--text);
  }

  /* Formulário de destino */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .field-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-wrap label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .field-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border 0.2s;
  }

  .field-wrap input:focus { border-color: var(--accent); }
  .field-wrap input::placeholder { color: #333; }

  /* Preview do caminho */
  .path-preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    min-height: 38px;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
  }

  .path-preview .path-icon {
    color: var(--accent);
    flex-shrink: 0;
  }

  .path-preview .path-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.2s;
  }

  .path-preview.active .path-text { color: var(--text); }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border-active);
    border-radius: 6px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    margin-bottom: 20px;
  }

  .drop-zone:hover,
  .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
    transition: transform 0.2s;
  }

  .drop-zone:hover .drop-icon,
  .drop-zone.dragover .drop-icon {
    transform: translateY(-3px);
  }

  .drop-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* Lista de arquivos */
  #file-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 24px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 12px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-type {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .file-type.html { background: rgba(200,245,58,0.15); color: var(--accent); }
  .file-type.zip  { background: rgba(100,150,255,0.12); color: #7aadff; }
  .file-type.other { background: rgba(255,255,255,0.05); color: var(--muted); }

  .file-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-size {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .file-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .file-remove:hover { color: var(--error); }

  /* Botão entregar */
  .btn-deliver {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 4px;
    padding: 14px 20px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-deliver:hover { opacity: 0.85; }
  .btn-deliver:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Status / feedback */
  #status-bar {
    margin-top: 16px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }

  .status-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .status-line.active { color: var(--text); }
  .status-line.done   { color: var(--accent); }
  .status-line.error  { color: var(--error); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .status-dot.spinning {
    animation: pulse 0.8s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 0.3; transform: scale(0.8); }
    to   { opacity: 1;   transform: scale(1.2); }
  }

  /* Success final */
  #success-banner {
    display: none;
    background: var(--accent-dim2);
    border: 1px solid rgba(200,245,58,0.25);
    border-radius: 6px;
    padding: 16px 18px;
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    line-height: 1.6;
  }

  #success-banner .success-url {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid rgba(200,245,58,0.3);
  }

  #success-banner .success-url:hover {
    border-color: var(--accent);
  }

  .btn-nova-entrega {
    background: transparent;
    border: 1px solid var(--border-active);
    border-radius: 4px;
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 10px;
    width: 100%;
    letter-spacing: 0.06em;
  }

  .btn-nova-entrega:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     TELA DE LOGIN
═══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-header">
    <div class="login-logo">Rush · Voidda</div>
    <div class="login-title">Portal de<br>Entrega</div>
    <div class="login-sub">Acesso exclusivo para equipe Motion</div>
  </div>

  <div class="token-input-wrap">
    <label>Seu token de acesso</label>
    <input type="text" id="token-input" placeholder="ex: rp2026px4" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
  </div>

  <p class="login-error" id="login-error">Token inválido. Confere com o Alessandro.</p>

  <button class="btn-primary" onclick="doLogin()">Entrar</button>
</div>

<!-- ═══════════════════════════════════════════
     TELA DE UPLOAD
═══════════════════════════════════════════ -->
<div id="upload-screen">

  <div class="upload-header">
    <div class="upload-header-left">
      <div class="upload-logo">Rush · Voidda</div>
      <div class="upload-user" id="user-name"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>

  <div class="section-label">Destino da peça</div>

  <div class="fields-grid">
    <div class="field-wrap">
      <label>Agência / Cliente</label>
      <input type="text" id="f-agencia" placeholder="africa" oninput="updatePath()" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </div>
    <div class="field-wrap">
      <label>Sub-cliente (opcional)</label>
      <input type="text" id="f-subcliente" placeholder="sadia" oninput="updatePath()" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </div>
    <div class="field-wrap">
      <label>Campanha</label>
      <input type="text" id="f-campanha" placeholder="futebol-032026" oninput="updatePath()" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </div>
    <div class="field-wrap">
      <label>Dimensão</label>
      <input type="text" id="f-dimensao" placeholder="300x250" oninput="updatePath()" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </div>
  </div>

  <div class="path-preview" id="path-preview">
    <span class="path-icon">›</span>
    <span class="path-text" id="path-text">preencha os campos acima</span>
  </div>

  <div class="section-label">Arquivos</div>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" multiple accept=".html,.zip,.js,.css,.json,.png,.jpg,.jpeg,.gif,.svg,.woff,.woff2,.ttf,.otf" />
    <span class="drop-icon">⬆</span>
    <div class="drop-title">Arraste os arquivos aqui</div>
    <div class="drop-sub">ou clique para selecionar · HTML, ZIP e assets</div>
  </div>

  <div id="file-list"></div>

  <button class="btn-deliver" id="btn-deliver" onclick="doDeliver()" disabled>
    <span id="btn-text">Entregar peça</span>
  </button>

  <div id="status-bar"></div>
  <div id="success-banner"></div>

</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const GITHUB_TOKEN = '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';
const REPO_OWNER   = 'ABORNATO';
const REPO_NAME    = 'voidda-displays';
const BRANCH       = 'main';
const DISPLAYS_URL = 'https://displays.voidda.com.br';

const MOTIONS = {
  'rp2026px4': { name: 'Rafael Panelli' },
  'cb2026nx1': { name: 'Charles Bornato' },
  'rm2026fx6': { name: 'Rafael Mendonça' },
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentUser = null;
let selectedFiles = [];

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
function doLogin() {
  const token = document.getElementById('token-input').value.trim().toLowerCase();
  const user   = MOTIONS[token];
  if (!user) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  currentUser = user;
  document.getElementById('login-screen').style.display  = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('user-name').textContent = user.name;
}

function doLogout() {
  currentUser = null;
  selectedFiles = [];
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('login-screen').style.display  = 'flex';
  document.getElementById('token-input').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('file-list').innerHTML = '';
  document.getElementById('status-bar').innerHTML = '';
  document.getElementById('status-bar').style.display = 'none';
  document.getElementById('success-banner').style.display = 'none';
  document.getElementById('success-banner').innerHTML = '';
  ['f-agencia','f-subcliente','f-campanha','f-dimensao'].forEach(id => {
    document.getElementById(id).value = '';
  });
  updatePath();
  updateDeliverBtn();
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ═══════════════════════════════════════════
// PATH PREVIEW
// ═══════════════════════════════════════════
function getPath() {
  const agencia    = document.getElementById('f-agencia').value.trim();
  const subcliente = document.getElementById('f-subcliente').value.trim();
  const campanha   = document.getElementById('f-campanha').value.trim();
  const dimensao   = document.getElementById('f-dimensao').value.trim();

  const parts = [agencia, subcliente, campanha, dimensao].filter(Boolean);
  return parts.join('/');
}

function updatePath() {
  const path    = getPath();
  const preview = document.getElementById('path-preview');
  const text    = document.getElementById('path-text');

  if (path) {
    text.textContent = path + '/';
    preview.classList.add('active');
  } else {
    text.textContent = 'preencha os campos acima';
    preview.classList.remove('active');
  }

  updateDeliverBtn();
}

// ═══════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(Array.from(e.dataTransfer.files));
});
fileInput.addEventListener('change', e => {
  addFiles(Array.from(e.target.files));
  fileInput.value = '';
});

function addFiles(newFiles) {
  newFiles.forEach(file => {
    if (!selectedFiles.find(f => f.name === file.name)) {
      selectedFiles.push(file);
    }
  });
  renderFileList();
  updateDeliverBtn();
}

function removeFile(name) {
  selectedFiles = selectedFiles.filter(f => f.name !== name);
  renderFileList();
  updateDeliverBtn();
}

function renderFileList() {
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  selectedFiles.forEach(file => {
    const ext  = file.name.split('.').pop().toLowerCase();
    const type = ext === 'html' ? 'html' : ext === 'zip' ? 'zip' : 'other';
    const size = formatSize(file.size);
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <span class="file-type ${type}">${ext}</span>
      <span class="file-name">${file.name}</span>
      <span class="file-size">${size}</span>
      <button class="file-remove" onclick="removeFile('${file.name}')" title="Remover">×</button>
    `;
    list.appendChild(item);
  });
}

function formatSize(bytes) {
  if (bytes < 1024)       return bytes + ' B';
  if (bytes < 1024*1024)  return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function updateDeliverBtn() {
  const ready = getPath().length > 0 && selectedFiles.length > 0;
  document.getElementById('btn-deliver').disabled = !ready;
}

// ═══════════════════════════════════════════
// GITHUB API — COMMIT
// ═══════════════════════════════════════════
async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function getFileSHA(path) {
  const res = await fetch(
    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`,
    { headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github+json' } }
  );
  if (res.status === 404) return null;
  const data = await res.json();
  return data.sha || null;
}

async function commitFile(path, base64Content, message) {
  const sha = await getFileSHA(path);
  const body = {
    message,
    content: base64Content,
    branch: BRANCH,
  };
  if (sha) body.sha = sha;

  const res = await fetch(
    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`,
    {
      method: 'PUT',
      headers: {
        Authorization: `token ${GITHUB_TOKEN}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    }
  );

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || `Erro ${res.status}`);
  }
  return res.json();
}

// ═══════════════════════════════════════════
// ENTREGA
// ═══════════════════════════════════════════
async function doDeliver() {
  const path     = getPath();
  const agencia  = document.getElementById('f-agencia').value.trim();
  const campanha = document.getElementById('f-campanha').value.trim();
  const btn      = document.getElementById('btn-deliver');
  const statusBar = document.getElementById('status-bar');
  const successBanner = document.getElementById('success-banner');

  btn.disabled = true;
  successBanner.style.display = 'none';
  statusBar.innerHTML = '';
  statusBar.style.display = 'flex';

  const commitMsg = `entrega: ${path}`;

  function addStatus(text, state = 'active') {
    const line = document.createElement('div');
    line.className = `status-line ${state}`;
    const dot = document.createElement('span');
    dot.className = `status-dot ${state === 'active' ? 'spinning' : ''}`;
    line.appendChild(dot);
    line.appendChild(document.createTextNode(text));
    statusBar.appendChild(line);
    return { line, dot };
  }

  let errors = [];

  for (let i = 0; i < selectedFiles.length; i++) {
    const file     = selectedFiles[i];
    const filePath = `${path}/${file.name}`;
    const { line, dot } = addStatus(`${file.name}`);

    try {
      const b64 = await fileToBase64(file);
      await commitFile(filePath, b64, commitMsg);
      dot.classList.remove('spinning');
      line.classList.remove('active');
      line.classList.add('done');
      dot.style.background = 'var(--accent)';
    } catch (err) {
      dot.classList.remove('spinning');
      line.classList.remove('active');
      line.classList.add('error');
      errors.push(file.name + ': ' + err.message);
    }
  }

  if (errors.length === 0) {
    const deliveryUrl = `${DISPLAYS_URL}/${path}/`;
    successBanner.style.display = 'block';
    successBanner.innerHTML = `
      ✓ Entrega concluída · ${selectedFiles.length} arquivo${selectedFiles.length > 1 ? 's' : ''}<br>
      <span style="color:var(--muted);margin-top:4px;display:block;">Peça disponível em ~30s:</span>
      <a class="success-url" href="${deliveryUrl}" target="_blank">${deliveryUrl}</a>
      <button class="btn-nova-entrega" onclick="resetForm()">→ Nova entrega</button>
    `;
  } else {
    addStatus('Erros: ' + errors.join(' | '), 'error');
    btn.disabled = false;
  }
}

function resetForm() {
  selectedFiles = [];
  ['f-agencia','f-subcliente','f-campanha','f-dimensao'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('file-list').innerHTML = '';
  document.getElementById('status-bar').innerHTML = '';
  document.getElementById('status-bar').style.display = 'none';
  document.getElementById('success-banner').style.display = 'none';
  document.getElementById('success-banner').innerHTML = '';
  updatePath();
  updateDeliverBtn();
}
</script>
</body>
</html>
