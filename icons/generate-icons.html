<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext("2d");
  const r = size * 0.2;
  // Background
  ctx.fillStyle = "#2563eb";
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  // Arrow shape
  const s = size / 192;
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.moveTo(20*s, 152*s);
  ctx.lineTo(76*s, 20*s);
  ctx.lineTo(108*s, 20*s);
  ctx.lineTo(60*s, 96*s);
  ctx.lineTo(124*s, 96*s);
  ctx.lineTo(48*s, 172*s);
  ctx.lineTo(20*s, 172*s);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "#bfdbfe";
  ctx.beginPath();
  ctx.moveTo(60*s, 96*s);
  ctx.lineTo(124*s, 96*s);
  ctx.lineTo(48*s, 172*s);
  ctx.lineTo(84*s, 172*s);
  ctx.lineTo(148*s, 96*s);
  ctx.lineTo(108*s, 20*s);
  ctx.lineTo(76*s, 20*s);
  ctx.closePath();
  ctx.fill();
}
drawIcon(document.getElementById("c192"), 192);
drawIcon(document.getElementById("c512"), 512);
document.getElementById("c192").toBlob(b => {
  const a = document.createElement("a"); a.href = URL.createObjectURL(b);
  a.download = "icon-192.png"; a.click();
});
setTimeout(() => {
  document.getElementById("c512").toBlob(b => {
    const a = document.createElement("a"); a.href = URL.createObjectURL(b);
    a.download = "icon-512.png"; a.click();
  });
}, 500);
</script>
</body>
</html>
